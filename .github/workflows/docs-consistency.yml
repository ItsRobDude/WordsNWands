name: docs-consistency

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  damage-model-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Validate damage model docs consistency
        run: ./scripts/check-damage-model-consistency.sh
